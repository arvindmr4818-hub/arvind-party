name: arvind_party
description: Arvind Party - Live Social Streaming App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ─── State Management ────────────────────────────────────────────
  get: ^4.7.3
  get_storage: ^2.1.1

  # ─── LiveKit (Free Self-Hosted Voice/Video — replaces Agora) ─────
  livekit_client: ^2.1.8

  # ─── Networking ──────────────────────────────────────────────────
  dio: ^5.9.0
  socket_io_client: ^3.1.4
  connectivity_plus: ^6.0.3

  # ─── Firebase (Auth only) ────────────────────────────────────────
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  firebase_messaging: ^14.7.10
  google_sign_in: ^6.2.1

  # ─── UI ──────────────────────────────────────────────────────────
  flutter_svg: ^2.0.10
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.2
  font_awesome_flutter: ^10.7.0
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.5
  glassmorphism: ^2.0.0
  scratcher: ^2.5.0
  confetti: ^0.8.0
  pinput: ^3.0.1

  # ─── Media ───────────────────────────────────────────────────────
  video_player: ^2.8.6
  audioplayers: ^6.7.1
  image_picker: ^1.1.2

  # ─── Payments ────────────────────────────────────────────────────
  razorpay_flutter: ^1.4.5

  # ─── Utils ───────────────────────────────────────────────────────
  intl: ^0.20.2
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  package_info_plus: ^4.2.0
  path_provider: ^2.1.1
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  crypto: ^3.0.3
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/login/videos/
    - assets/images/
    - assets/login/login_icon.png
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
