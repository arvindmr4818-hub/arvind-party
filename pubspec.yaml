name: arvind_party
description: Arvind Party - Live Social Streaming App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.7.3

  # Storage
  shared_preferences: ^2.2.2
  get_storage: ^2.1.1
  sqflite: ^2.3.0
  path: ^1.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Social Login
  flutter_facebook_auth: ^7.1.6
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2

  # UI
  flutter_svg: ^2.3.0
  cached_network_image: 3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.3
  font_awesome_flutter: ^11.0.0
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.0
  fl_chart: ^1.2.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^2.0.1
  badges: ^3.1.1
  flutter_countdown_timer: ^4.1.0
  avatar_glow: ^3.0.1
  confetti: ^0.8.0
  flutter_fortune_wheel: ^1.3.1
  marquee: ^2.2.3
  expandable: ^5.0.1
  emoji_picker_flutter: ^4.4.0
  photo_view: ^0.15.0

  # Phone Auth
  pinput: ^6.0.2
  intl_phone_number_input: ^0.7.4
  pin_code_fields: ^9.4.0

  # Network
  dio: ^5.9.2
  socket_io_client: ^3.1.4
  web_socket_channel: ^3.0.3
  connectivity_plus: ^7.1.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.3.3
  rxdart: ^0.28.0
  share_plus: ^13.1.0
  url_launcher: ^6.2.5
  permission_handler: ^12.0.3
  package_info_plus: ^10.1.0
  device_info_plus: ^13.1.0
  local_auth: ^3.0.1
  timeago: ^3.6.0
  crypto: ^3.0.3
  file_picker: ^12.0.0-beta.5
  flutter_local_notifications: ^22.0.0
  scratcher: ^2.4.1

  # Media
  image_picker: ^1.1.0
  image_cropper: ^12.2.1
  flutter_image_compress: ^2.2.0
  video_player: ^2.8.6

  # Audio/Video Chat
  just_audio: ^0.10.5
  audioplayers: ^6.0.0
  youtube_player_flutter: ^10.0.1
  record: ^6.2.1
  agora_rtc_engine: ^6.2.6
  agora_rtm: ^2.2.0
  flutter_webrtc: ^1.4.1
  wakelock_plus: ^1.1.1
  agora_chat_sdk: ^1.0.5

  # Payment
  flutter_stripe: ^13.0.0
  razorpay_flutter: ^1.3.7

  # Cloud Storage
  firebase_storage: ^13.4.2
  cloud_firestore: ^6.5.0
  cloudinary_public: ^0.23.1

  # QR/Scanner
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0

  # Location
  geolocator: ^14.0.2
  google_maps_flutter: ^2.5.3
  flutter_polyline_points: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
   
flutter:
  uses-material-design: true

  assets:
    - assets/login/videos/lion_bg.mp4
    - assets/images/
    - assets/login/login_icon.png
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"

dependency_overrides:
  http: ^1.2.0