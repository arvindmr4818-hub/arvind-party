name: arvind_party
description: Arvind Party - Live Social Streaming App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.7.3

  # Video / Live Streaming (Agora + Video Player)
  agora_rtc_engine: ^6.2.2
  video_player: ^2.8.6

  # Firebase Auth (Phone OTP + Google Login only)
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  google_sign_in: ^6.2.1

  # UI
  flutter_svg: 2.2.1
  cached_network_image: 3.4.1
  shimmer: ^3.0.0
  lottie: 3.3.2
  font_awesome_flutter: ^10.7.0

  # Phone Auth
  pinput: ^3.0.1

  # Push Notifications
  firebase_messaging: ^14.7.10

  # Permissions, Connectivity, Sharing
  permission_handler: ^11.1.0
  connectivity_plus: ^6.0.3
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  package_info_plus: ^4.1.0
  path_provider: ^2.1.1

  # Utils
  flutter_animate: ^4.5.0
  dio: 5.9.0
  get_storage: ^2.1.1
  socket_io_client: ^3.1.4
  intl: ^0.20.2

  # Media
  audioplayers: ^6.7.1
  image_picker: ^1.2.2

  # Payments
  razorpay_flutter: ^1.4.5

  # UI Enhancements
  percent_indicator: ^4.2.5
  glassmorphism: ^2.0.0
  scratcher: ^2.5.0
  confetti: ^0.8.0
  shimmer_animation: ^2.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/login/videos/lion_bg.mp4
    - assets/images/
    - assets/login/login_icon.png
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600